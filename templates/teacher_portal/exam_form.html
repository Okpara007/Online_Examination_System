{% extends 'base.html' %}
{% block content %}
<div class="site-section">
  <div class="container">
    <h2 class="mb-3">{{ page_title }}</h2>
    {% include 'teacher_portal/_nav.html' %}
    <form method="post" class="bg-white p-4 border rounded">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn btn-primary" type="submit">Save</button>
      <a class="btn btn-outline-secondary" href="{% url 'teacher_exam_list' %}">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
